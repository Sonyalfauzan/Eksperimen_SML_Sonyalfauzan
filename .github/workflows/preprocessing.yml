name: "Automated Preprocessing — Wine Quality (Sonyalfauzan)"

on:
  push:
    branches: [ main, master ]
    paths:
      - "preprocessing/**"
      - "winequality_raw/**"
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      test_size:
        description: "Proporsi data test (contoh: 0.2)"
        required: false
        default: "0.2"
      quality_threshold:
        description: "Ambang batas kelas Good (quality >= N)"
        required: false
        default: "7"

jobs:
  preprocessing:
    name: "Run Preprocessing Pipeline — Sonyalfauzan"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # -----------------------------------------------------------------------
      - name: "1. Checkout repository"
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      - name: "2. Setup Python 3.12.7"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"
          cache: "pip"

      # -----------------------------------------------------------------------
      - name: "3. Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install \
            numpy==1.26.4 \
            pandas==2.2.2 \
            scikit-learn==1.5.1 \
            scipy==1.13.1

      # -----------------------------------------------------------------------
      - name: "4. Jalankan automate_Sonyalfauzan.py"
        run: |
          cd preprocessing
          python automate_Sonyalfauzan.py \
            --input "https://archive.ics.uci.edu/ml/machine-learning-databases/wine-quality/winequality-red.csv" \
            --output_dir "winequality_preprocessing" \
            --test_size ${{ github.event.inputs.test_size || '0.2' }} \
            --quality_threshold ${{ github.event.inputs.quality_threshold || '7' }}

      # -----------------------------------------------------------------------
      - name: "5. Validasi output artifacts"
        run: |
          echo "=== Validasi Artefak Preprocessing ==="
          for f in \
            "preprocessing/winequality_preprocessing/winequality_preprocessed.csv" \
            "preprocessing/winequality_preprocessing/train.csv" \
            "preprocessing/winequality_preprocessing/test.csv" \
            "preprocessing/winequality_preprocessing/scaler.pkl"; do
            if [ -f "$f" ]; then
              echo "  ✅  $f"
            else
              echo "  ❌  TIDAK DITEMUKAN: $f"
              exit 1
            fi
          done
          echo "=== Semua artefak terverifikasi ==="

      # -----------------------------------------------------------------------
      - name: "6. Tampilkan statistik dataset"
        run: |
          python - <<'EOF'
          import pandas as pd

          full  = pd.read_csv("preprocessing/winequality_preprocessing/winequality_preprocessed.csv")
          train = pd.read_csv("preprocessing/winequality_preprocessing/train.csv")
          test  = pd.read_csv("preprocessing/winequality_preprocessing/test.csv")

          print("=" * 55)
          print("STATISTIK PREPROCESSING — Sonyalfauzan")
          print("=" * 55)
          print(f"Full dataset : {full.shape[0]:,} baris × {full.shape[1]} kolom")
          print(f"Training set : {train.shape[0]:,} baris")
          print(f"Testing set  : {test.shape[0]:,} baris")
          print(f"Fitur        : {full.shape[1] - 1}")
          print(f"\nDistribusi kelas (full dataset):")
          vc = full["quality_binary"].value_counts()
          print(f"  Bad  (0): {vc.get(0, 0):,}  ({vc.get(0, 0)/len(full)*100:.1f}%)")
          print(f"  Good (1): {vc.get(1, 0):,}   ({vc.get(1, 0)/len(full)*100:.1f}%)")
          EOF

      # -----------------------------------------------------------------------
      - name: "7. Upload preprocessed dataset sebagai GitHub artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "winequality-preprocessed-sonyalfauzan-run${{ github.run_number }}"
          path: "preprocessing/winequality_preprocessing/"
          retention-days: 30
          compression-level: 9

      # -----------------------------------------------------------------------
      - name: "8. Commit preprocessed data ke repository"
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add preprocessing/winequality_preprocessing/
          git diff --staged --quiet || git commit \
            -m "chore(data): update preprocessed dataset [run #${{ github.run_number }}]"

      - name: "9. Push perubahan ke repository"
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
